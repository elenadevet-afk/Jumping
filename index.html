<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 0; background: #87ceeb; overflow: hidden; font-family: sans-serif; }
        #game { width: 400px; height: 500px; position: relative; }
        .step { position: absolute; width: 60px; height: 10px; background: #4caf50; border-radius: 5px; }
        #char { position: absolute; width: 70px; height: 70px; transition: 0.5s; }
        #msg { position: absolute; bottom: 0; right: 0; width: 200px; background: black; color: white; padding: 10px; text-align: center; }
    </style>
</head>
<body>
    <div id="game">
        <div id="char" style="background: url('https://cdn-icons-png.flaticon.com/128/1997/1997576.png') no-repeat center/contain;"></div>
        <div id="msg">
            <h3 id="q">Question</h3>
            <button onclick="check()">True</button>
            <button onclick="check()">False</button>
        </div>
    </div>
    <script>
        const g = document.getElementById("game");
        for(let i=0; i<10; i++) {
            let s = document.createElement("div");
            s.className = "step";
            s.style.left = (30 + i * 30) + "px";
            s.style.bottom = (60 + i * 40) + "px";
            g.appendChild(s);
        }
        function check() { alert("Correct!"); }
    </script>
</body>
</html>
