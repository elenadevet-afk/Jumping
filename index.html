<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Конструктор игры</title>
    <style>
        body { margin: 0; display: flex; font-family: sans-serif; background: #121212; color: #fff; height: 100vh; }
        #panel { width: 400px; padding: 20px; border-right: 2px solid #ffea00; overflow-y: auto; background: #1a1a1a; }
        .card { background: #252525; padding: 10px; margin-bottom: 10px; border-left: 4px solid #ffea00; border-radius: 4px; }
        input, select { display: block; width: 90%; margin-bottom: 10px; padding: 5px; }
        .btn-copy { background: #ffea00; color: #000; padding: 15px; width: 100%; border: none; cursor: pointer; font-weight: bold; margin-top: 20px; }
        h3 { color: #ffea00; }
    </style>
</head>
<body>

<div id="panel">
    <h2>Настройки игры 🛠️</h2>
    <div class="card">
        <label>Размер персонажа</label><input type="range" id="p-size" min="20" max="150" value="70" oninput="draw()">
        <label>Угол наклона лестницы</label><input type="range" id="angle" min="5" max="80" value="30" oninput="draw()">
        <label>Кол-во жизней</label><input type="number" id="lives" value="3" oninput="draw()">
        <label>Время (мин)</label><input type="number" id="time" value="5" oninput="draw()">
    </div>
    
    <div class="card">
        <label>Цвет ступеней</label><input type="color" id="c-step" value="#4caf50" oninput="draw()">
        <label>Цвет таймера</label><input type="color" id="c-time" value="#ff0000" oninput="draw()">
    </div>

    <div id="q-list"></div>
    <button class="btn-copy" onclick="copyCode()">СКОПИРОВАТЬ КОД</button>
</div>

<div style="flex-grow:1; display:flex; justify-content:center; align-items:center; background:#87ceeb;">
    <div id="preview" style="width:400px; height:500px; border:4px solid #fff; position:relative; overflow:hidden;"></div>
</div>

<script>
    let tasks = Array.from({length: 5}, (_, i) => ({q: "Вопрос "+(i+1), right: "Верно", wrong: "Нет"}));
    
    function init() {
        const c = document.getElementById('q-list');
        c.innerHTML = '<h3>Вопросы:</h3>';
        tasks.forEach((val, i) => {
            const d = document.createElement('div'); d.className = 'card';
            d.innerHTML = `Q${i+1}: <input type="text" value="${val.q}" oninput="tasks[${i}].q=this.value;draw()">
                Верно: <input type="text" value="${val.right}" oninput="tasks[${i}].right=this.value;draw()">
                Ошибка: <input type="text" value="${val.wrong}" oninput="tasks[${i}].wrong=this.value;draw()">`;
            c.appendChild(d);
        });
        draw();
    }

    function draw() {
        const pSize = document.getElementById('p-size').value;
        const angle = document.getElementById('angle').value;
        const cStep = document.getElementById('c-step').value;
        const cTime = document.getElementById('c-time').value;
        const preview = document.getElementById('preview');
        
        let html = `<div style="color:${cTime}; font-weight:bold; padding:10px;">🕒 05:00</div>`;
        
        tasks.forEach((_, i) => {
            html += `<div style="position:absolute; width:60px; height:10px; background:${cStep}; 
            left:${30 + (i*angle)}px; bottom:${60 + (i*60)}px;"></div>`;
        });
        
        html += `<div style="position:absolute; width:${pSize}px; height:${pSize}px; background:red; 
        left:${30 + 30 - pSize/2}px; bottom:70px;"></div>`;
        
        preview.innerHTML = html;
    }

    function copyCode() {
        navigator.clipboard.writeText(document.documentElement.outerHTML);
        alert("Код скопирован!");
    }

    init();
</script>
</body>
</html>
