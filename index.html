<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Platformer Builder PRO</title>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; background: #121212; color: white; }
        #panel { width: 500px; background: #1a1a1a; padding: 20px; border-right: 2px solid #ffea00; overflow-y: auto; }
        .card { background: #252525; padding: 10px; margin-bottom: 10px; border-left: 4px solid #ffea00; }
        input { width: 90%; padding: 8px; margin: 5px 0; }
        .btn-copy { background: #ffea00; color: black; padding: 15px; width: 100%; border: none; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div id="panel">
    <h2>Quest Settings 🛠️</h2>
    Character Size: <input type="range" id="p-size" min="50" max="400" value="150" oninput="draw()"><br>
    Lives: <input type="number" id="lives-count" value="3" min="1" max="10" oninput="draw()"><br>
    Time (min): <input type="number" id="time-limit" value="5" min="0" oninput="draw()"><br>
    Victory Text: <input type="text" id="win-text" value="Well done!" oninput="draw()"><br>
    Platform Color: <input type="color" id="p-col" value="#4caf50" onchange="draw()"><br>
    Character URL: <input type="text" id="p-url" value="https://cdn-icons-png.flaticon.com/128/1997/1997576.png" oninput="draw()"><br>
    <div id="q-list"></div>
    <button class="btn-copy" onclick="copyCode()">COPY CODE FOR GENIALLY</button>
</div>

<div id="view" style="flex-grow:1; display:flex; justify-content:center; align-items:center;">
    <div id="preview-frame" style="background:#87ceeb; width:400px; height:600px;"></div>
</div>

<script>
    let tasks = Array.from({length: 10}, (_, i) => ({q: "Question "+(i+1), right: "True", wrong: "False"}));
    
    function renderEditor() {
        const c = document.getElementById('q-list'); c.innerHTML = '<h3>Questions:</h3>';
        tasks.forEach((val, i) => {
            const d = document.createElement('div'); d.className = 'card';
            d.innerHTML = `Q${i+1}: <input type="text" value="${val.q}" oninput="tasks[${i}].q=this.value;draw()"><br>
                Correct: <input type="text" value="${val.right}" oninput="tasks[${i}].right=this.value;draw()"><br>
                Wrong: <input type="text" value="${val.wrong}" oninput="tasks[${i}].wrong=this.value;draw()">`;
            c.appendChild(d);
        });
    }

    function getCode() {
        const pSize = document.getElementById('p-size').value;
        const pUrl = document.getElementById('p-url').value;
        const pCol = document.getElementById('p-col').value;
        const data = JSON.stringify(tasks);
        
        return `<iframe srcdoc='<!DOCTYPE html><html><body style="margin:0;background:transparent;font-family:sans-serif">
            <div id="world" style="position:relative;width:400px;height:1000px;overflow:visible">
                <div id="p" style="position:absolute;width:${pSize}px;height:${pSize}px;background:url(${pUrl}) no-repeat center/contain;transition:0.5s;z-index:100"></div>
                <div id="platforms-container"></div>
            </div>
            <div id="m" style="position:fixed;bottom:0px;right:0px;width:200px;background:#000;padding:10px;text-align:center;color:#fff;z-index:500">
                <h3 id="q" style="margin:5px 0; font-size:14px;"></h3>
                <button id="b1" onclick="check(true)" style="display:block;width:100%;cursor:pointer;"></button>
                <button id="b2" onclick="check(false)" style="display:block;width:100%;cursor:pointer;"></button>
            </div>
            <script>
                const tasks=${data}, p=document.getElementById("p"), q=document.getElementById("q"), b1=document.getElementById("b1"), b2=document.getElementById("b2");
                const pSize=${pSize}; let lvl=0;
                
                tasks.forEach((_,i)=>{
                    const d=document.createElement("div");
                    const x = 50 + (i * 20), y = 50 + (i * 80);
                    d.style="position:absolute;width:100px;height:15px;background:${pCol};left:"+x+"px;bottom:"+y+"px;border-radius:5px";
                    document.getElementById("platforms-container").appendChild(d);
                    d.dataset.y = y; d.dataset.x = x;
                });
                
                function moveP(i) {
                    const plats = document.querySelectorAll("#platforms-container div");
                    p.style.left = (parseInt(plats[i].dataset.x) + 50 - pSize/2) + "px";
                    // Сдвигаем персонажа чуть ниже, чтобы при большом размере он не улетал вверх
                    p.style.bottom = (parseInt(plats[i].dataset.y) + 15) + "px";
                }
                
                function check(isRight){
                    const r = isRight ? (b1.dataset.r==="true") : (b2.dataset.r==="true");
                    if(r){
                        lvl++;
                        if(lvl < tasks.length) { moveP(lvl); show(); }
                        else alert("Victory!");
                    } else { lvl=0; moveP(0); show(); }
                }
                function show(){ 
                    q.innerText=tasks[lvl].q; const c=Math.random()>0.5;
                    b1.innerText=c?tasks[lvl].right:tasks[lvl].wrong; b2.innerText=c?tasks[lvl].wrong:tasks[lvl].right;
                    b1.dataset.r=c; b2.dataset.r=!c;
                }
                moveP(0); show();
            <\/script></body></html>' width="400" height="600" frameborder="0" allowtransparency="true"></iframe>`;
    }

    function draw() { document.getElementById('preview-frame').innerHTML = getCode(); }
    function copyCode() { navigator.clipboard.writeText(getCode()); alert("Code copied!"); }
    renderEditor(); draw();
</script>
</body>
</html>
