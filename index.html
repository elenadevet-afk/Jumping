<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Verbs Adventure</title>
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; 
        }
        
        /* Фон на весь экран Genially */
        .wrapper {
            width: 100%; height: 100%; 
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1000') center/cover no-repeat;
            position: relative; box-sizing: border-box;
        }

        /* Платформы (картинка деревянной доски) */
        .platform {
            position: absolute; width: 75px; height: 40px;
            background: url('https://img.icons8.com/color/96/wooden-plank.png') center/contain no-repeat;
            transform: translate(-50%, -50%);
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 12px; color: white;
            text-shadow: 1px 1px 2px black; z-index: 5;
        }

        /* Контейнер игрока (координаты) */
        #player {
            position: absolute; width: 50px; height: 50px;
            transform: translate(-50%, -85%);
            transition: left 0.5s cubic-bezier(0.4, 0, 0.2, 1), top 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10; pointer-events: none;
        }

        /* Сам персонаж (эмодзи или картинка) */
        #player-sprite {
            width: 100%; height: 100%;
            font-size: 2.2rem; display: flex; align-items: center; justify-content: center;
        }

        /* Победная анимация: ровно 3 прыжка персонажа */
        .victory-jump { animation: winJump 1.2s ease-in-out 3 forwards; }
        @keyframes winJump { 
            0%, 100% { transform: translate(-50%, -85%) scale(1); } 
            50% { transform: translate(-50%, -140%) scale(1.15); } 
        }

        /* Панель вопросов снизу */
        .quiz-panel {
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 600px; background: rgba(255,255,255,0.96);
            border-radius: 12px; padding: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.25);
            z-index: 20; text-align: center; box-sizing: border-box;
        }

        .question { font-size: 1.05rem; font-weight: 600; margin-bottom: 12px; color: #1a1a1a; }
        .buttons { display: flex; gap: 12px; justify-content: center; }
        
        .btn-ui {
            background: #6c29ff; color: white; border: none; padding: 10px 20px;
            font-size: 0.9rem; border-radius: 20px; cursor: pointer; font-weight: bold;
            transition: background 0.2s, transform 0.1s;
        }
        .btn-ui:hover { background: #4300d6; transform: translateY(-1px); }

        /* Сердечки (Жизни) */
        .hud-lives {
            position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.65);
            padding: 6px 14px; border-radius: 20px; display: flex; gap: 4px; z-index: 20;
            color: white; font-weight: bold; align-items: center; font-size: 0.9rem;
        }
        .heart { color: #d83f55; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="hud-lives">HP: <div id="hearts-box"></div></div>
    <div id="map-objects"></div>
    <div id="player"><div id="player-sprite">🧙</div></div>

    <div class="quiz-panel" id="quiz-panel">
        <div class="question" id="q-text">Загрузка...</div>
        <div class="buttons" id="b-box"></div>
    </div>
</div>

<script>
    // ==========================================
    // БЛОК НАСТРОЕК (МЕНЯЙТЕ ЗАДАНИЯ ПРЯМО ТУТ)
    // ==========================================
    const maxLives = 3; // Количество жизней
    
    // Координаты (x, y) платформ в % от экрана. 
    // Если тип "wrong" — это ловушка. Игрок потеряет жизнь и вернется назад.
    const platforms = [
        { "x": 15, "y": 75, "type": "start", "question": "Are you ready to practice Modal Verbs?", "answerA": "Let's go!", "answerB": "No, wait" },
        { "x": 35, "y": 60, "type": "correct", "question": "You ___ look at me when I'm speaking to you!", "answerA": "must", "answerB": "might" },
        { "x": 50, "y": 42, "type": "wrong", "question": "Ой! Это ложная платформа-ловушка.", "answerA": "Назад", "answerB": "Упс" },
        { "x": 70, "y": 55, "type": "correct", "question": "I ___ ride a bicycle when I was only five.", "answerA": "could", "answerB": "can" },
        { "x": 88, "y": 35, "type": "finish", "question": "", "answerA": "", "answerB": "" }
    ];
    // ==========================================

    let currentLives = maxLives;
    let currentPlatformIndex = 0;

    const mapObjects = document.getElementById('map-objects');
    const player = document.getElementById('player');
    const qText = document.getElementById('q-text');
    const bBox = document.getElementById('b-box');
    const heartsBox = document.getElementById('hearts-box');

    function initGame() {
        currentLives = maxLives;
        currentPlatformIndex = 0;
        player.classList.remove('victory-jump');
        buildMap();
    }

    function buildMap() {
        mapObjects.innerHTML = '';
        platforms.forEach((p) => {
            const el = document.createElement('div');
            el.className = 'platform';
            el.style.left = p.x + '%';
            el.style.top = p.y + '%';
            if(p.type === 'finish') el.innerHTML = '🏁';
            mapObjects.appendChild(el);
        });
        
        updateHUD();
        syncPlayerPosition();
        updateQuiz();
    }

    function syncPlayerPosition() {
        const activePlat = platforms[currentPlatformIndex];
        if(activePlat) {
            player.style.left = activePlat.x + '%';
            player.style.top = activePlat.y + '%';
        }
    }

    function updateHUD() {
        heartsBox.innerHTML = '';
        for(let i = 0; i < currentLives; i++) {
            heartsBox.innerHTML += '<span class="heart">❤️</span>';
        }
        if(currentLives <= 0) gameOver();
    }

    function updateQuiz() {
        const currentPlat = platforms[currentPlatformIndex];
        if (!currentPlat || currentPlat.type === 'finish') {
            winGame();
            return;
        }

        qText.innerText = currentPlat.question;
        bBox.innerHTML = `
            <button class="btn-ui" onclick="handleChoice('a')">${currentPlat.answerA}</button>
            <button class="btn-ui" onclick="handleChoice('b')">${currentPlat.answerB}</button>
        `;
    }

    function handleChoice(letter) {
        let targetIdx = currentPlatformIndex + 1;
        if (targetIdx >= platforms.length) return;

        const targetPlat = platforms[targetIdx];

        if(targetPlat.type === 'wrong') {
            currentPlatformIndex = targetIdx;
            syncPlayerPosition();
            currentLives--;
            updateHUD();
            
            if(currentLives > 0) {
                setTimeout(() => {
                    currentPlatformIndex = Math.max(0, targetIdx - 1);
                    syncPlayerPosition();
                    updateQuiz();
                }, 800);
            }
        } else {
            currentPlatformIndex = targetIdx;
            syncPlayerPosition();
            setTimeout(updateQuiz, 600);
        }
    }

    function gameOver() {
        qText.innerText = "💥 Жизни закончились! Попробуем сначала?";
        bBox.innerHTML = '<button class="btn-ui" onclick="initGame()">Сбросить уровень</button>';
    }

    function winGame() {
        qText.innerText = "🎉 Великолепно! Вы успешно прошли весь маршрут!";
        bBox.innerHTML = '';
        player.classList.add('victory-jump');
    }

    window.onload = initGame;
</script>

</body>
</html>
