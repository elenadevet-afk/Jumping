<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Platformer Builder PRO</title>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; background: #121212; color: white; }
        /* Панель теперь имеет фиксированный размер и прокрутку */
        #panel { width: 450px; background: #1a1a1a; padding: 20px; border-right: 2px solid #ffea00; overflow-y: auto; height: 100vh; }
        .setting-group { margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        input { width: 90%; padding: 8px; margin: 5px 0; background: #333; border: 1px solid #555; color: white; }
        .btn-copy { background: #ffea00; color: black; padding: 15px; width: 100%; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; }
        label { font-size: 12px; color: #ffea00; display: block; }
    </style>
</head>
<body>

<div id="panel">
    <h2>Настройки квеста 🛠️</h2>
    
    <div class="setting-group">
        <label>Размер персонажа</label><input type="range" id="p-size" min="20" max="150" value="70" oninput="draw()">
        <label>Угол наклона лестницы</label><input type="range" id="angle" min="5" max="80" value="30" oninput="draw()">
    </div>

    <div class="setting-group">
        <label>Цвет таймера</label><input type="color" id="timer-col" value="#ff0000" onchange="draw()">
        <label>Цвет текста вопросов</label><input type="color" id="txt-col" value="#ffffff" onchange="draw()">
        <label>Цвет кнопок</label><input type="color" id="btn-col" value="#444444" onchange="draw()">
        <label>Цвет ступеней</label><input type="color" id="p-col" value="#4caf50" onchange="draw()">
    </div>

    <div class="setting-group">
        <label>Кол-во жизней</label><input type="number" id="lives-count" value="3" oninput="draw()">
        <label>Время (мин)</label><input type="number" id="time-limit" value="5" oninput="draw()">
        <label>Текст победы</label><input type="text" id="win-text" value="Победа!" oninput="draw()">
    </div>

    <div id="q-list"></div>
    <button class="btn-copy" onclick="copyCode()">СКОПИРОВАТЬ КОД ДЛЯ GENIALLY</button>
</div>

<div style="flex-grow:1; display:flex; justify-content:center; align-items:center; background:#222;">
    <div id="preview-frame" style="background:#87ceeb; width:400px; height:500px; border:2px solid #fff;"></div>
</div>

<script>
    let tasks = Array.from({length: 5}, (_, i) => ({q: "Вопрос "+(i+1), right: "Верно", wrong: "Ошибка"}));
    
    function renderEditor() {
        const c = document.getElementById('q-list'); c.innerHTML = '<h3>Вопросы:</h3>';
        tasks.forEach((val, i) => {
            const d = document.createElement('div'); d.className = 'setting-group';
            d.innerHTML = `Q${i+1}: <input type="text" value="${val.q}" oninput="tasks[${i}].q=this.value;draw()"><br>
                Правильный: <input type="text" value="${val.right}" oninput="tasks[${i}].right=this.value;draw()"><br>
                Неверный: <input type="text" value="${val.wrong}" oninput="tasks[${i}].wrong=this.value;draw()">`;
            c.appendChild(d);
        });
    }

    function draw() {
        const pSize = document.getElementById('p-size').value;
        const angle = document.getElementById('angle').value;
        const pCol = document.getElementById('p-col').value;
        const timerCol = document.getElementById('timer-col').value;
        const txtCol = document.getElementById('txt-col').value;
        const btnCol = document.getElementById('btn-col').value;
        const winText = document.getElementById('win-text').value;
        
        const preview = document.getElementById('preview-frame');
        preview.innerHTML = `
            <div id="g" style="position:relative;width:400px;height:500px">
                <div id="p" style="position:absolute;width:${pSize}px;height:${pSize}px;background:red;transition:0.3s;"></div>
                <div style="position:absolute;top:5px;left:10px;color:${timerCol};font-weight:bold;">🕒 05:00</div>
            </div>
            <div style="position:absolute;bottom:0;width:400px;background:#000;color:${txtCol};text-align:center;padding:10px;">
                Вопрос будет здесь...<br>
                <button style="background:${btnCol};color:${txtCol};margin:5px;">Ответ 1</button>
                <button style="background:${btnCol};color:${txtCol};margin:5px;">Ответ 2</button>
            </div>
        `;
        
        const g = preview.querySelector('#g');
        tasks.forEach((_, i) => {
            const d = document.createElement("div");
            // Угол наклона регулирует шаг по горизонтали (angle) и вертикали (фиксировано 60)
            d.style = `position:absolute;width:60px;height:10px;background:${pCol};left:${30 + (i * angle)}px;bottom:${60 + (i * 60)}px;`;
            g.appendChild(d);
        });
    }

    function copyCode() {
        alert("Код для вставки в Genially скопирован!");
        // Здесь будет полная генерация HTML/JS для вставки
    }

    renderEditor(); draw();
</script>
</body>
</html>
