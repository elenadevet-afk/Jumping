<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Platformer Builder PRO</title>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; background: #121212; color: white; }
        #panel { width: 450px; padding: 20px; border-right: 2px solid #ffea00; overflow-y: auto; background: #1a1a1a; }
        .card { background: #252525; padding: 10px; margin-bottom: 10px; border-left: 4px solid #ffea00; }
        input { width: 90%; padding: 8px; margin: 5px 0; }
        .btn-copy { background: #ffea00; color: black; padding: 15px; width: 100%; border: none; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div id="panel">
    <h2>Настройки 🛠️</h2>
    <label>Размер персонажа</label><input type="range" id="p-size" min="20" max="150" value="70" oninput="draw()">
    <label>Угол наклона лестницы</label><input type="range" id="angle" min="5" max="80" value="30" oninput="draw()">
    <label>Цвет ступеней</label><input type="color" id="c-step" value="#4caf50" oninput="draw()">
    
    <div id="q-list"></div>
    <button class="btn-copy" onclick="copyCode()">СКОПИРОВАТЬ КОД</button>
</div>

<div id="view" style="flex-grow:1; display:flex; justify-content:center; align-items:center; background:#87ceeb;">
    <div id="preview" style="width:400px; height:500px; border:2px solid #fff; position:relative; overflow:hidden;"></div>
</div>

<script>
    let tasks = Array.from({length: 5}, (_, i) => ({q: "Вопрос "+(i+1), right: "Да", wrong: "Нет"}));
    
    function renderEditor() {
        const c = document.getElementById('q-list'); c.innerHTML = '<h3>Вопросы:</h3>';
        tasks.forEach((val, i) => {
            const d = document.createElement('div'); d.className = 'card';
            d.innerHTML = `Q${i+1}: <input type="text" value="${val.q}" oninput="tasks[${i}].q=this.value;draw()"><br>
                Верно: <input type="text" value="${val.right}" oninput="tasks[${i}].right=this.value;draw()"><br>
                Ошибка: <input type="text" value="${val.wrong}" oninput="tasks[${i}].wrong=this.value;draw()">`;
            c.appendChild(d);
        });
    }

    function draw() {
        const pSize = document.getElementById('p-size').value;
        const angle = document.getElementById('angle').value;
        const cStep = document.getElementById('c-step').value;
        const preview = document.getElementById('preview');
        
        // 1. Лестница
        let html = '';
        tasks.forEach((_, i) => {
            html += `<div style="position:absolute; width:60px; height:10px; background:${cStep}; 
            left:${30 + (i*angle)}px; bottom:${60 + (i*60)}px;"></div>`;
        });
        
        // 2. Персонаж
        html += `<div style="position:absolute; width:${pSize}px; height:${pSize}px; background:red; 
        left:${30 + 30 - pSize/2}px; bottom:70px;"></div>`;

        // 3. Панель вопросов (которая раньше пропадала)
        html += `
            <div style="position:absolute; bottom:0; width:100%; background:rgba(0,0,0,0.8); color:white; padding:10px; text-align:center;">
                <h3 id="display-q" style="margin:5px 0;">${tasks[0].q}</h3>
                <button style="margin:5px;">${tasks[0].right}</button>
                <button style="margin:5px;">${tasks[0].wrong}</button>
            </div>`;
        
        preview.innerHTML = html;
    }

    function copyCode() {
        navigator.clipboard.writeText(document.documentElement.outerHTML);
        alert("Код скопирован!");
    }

    renderEditor(); draw();
</script>
</body>
</html>
