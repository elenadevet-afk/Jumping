<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Platformer Builder PRO</title>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; background: #121212; color: white; }
        #panel { width: 450px; background: #1a1a1a; padding: 20px; border-right: 2px solid #ffea00; overflow-y: auto; }
        .card { background: #252525; padding: 10px; margin-bottom: 10px; border-left: 4px solid #ffea00; }
        input { width: 90%; padding: 8px; margin: 5px 0; }
        .btn-copy { background: #ffea00; color: black; padding: 15px; width: 100%; border: none; cursor: pointer; font-weight: bold; margin-top: 20px; }
        label { font-size: 12px; color: #aaa; }
    </style>
</head>
<body>

<div id="panel">
    <h2>Quest Settings 🛠️</h2>
    <label>Character Size</label><br><input type="range" id="p-size" min="20" max="150" value="70" oninput="draw()"><br>
    <label>Лестница: Начало (X)</label><br><input type="range" id="start-x" min="0" max="300" value="20" oninput="draw()"><br>
    <label>Лестница: Наклон (Шаг Y)</label><br><input type="range" id="step-y" min="10" max="100" value="35" oninput="draw()"><br>
    <hr>
    Lives: <input type="number" id="lives-count" value="3" min="1" oninput="draw()"><br>
    Character URL: <input type="text" id="p-url" value="https://cdn-icons-png.flaticon.com/128/1997/1997576.png" oninput="draw()"><br>
    Platform Color: <input type="color" id="p-col" value="#4caf50" onchange="draw()"><br>
    <div id="q-list"></div>
    <button class="btn-copy" onclick="copyCode()">COPY CODE FOR GENIALLY</button>
</div>

<div id="view" style="flex-grow:1; display:flex; justify-content:center; align-items:center;">
    <div id="preview-frame" style="background:#87ceeb; width:400px; height:500px; border:2px solid #fff;"></div>
</div>

<script>
    let tasks = Array.from({length: 10}, (_, i) => ({q: "Question "+(i+1), right: "True", wrong: "False"}));
    
    function renderEditor() {
        const c = document.getElementById('q-list'); c.innerHTML = '<h3>Questions:</h3>';
        tasks.forEach((val, i) => {
            const d = document.createElement('div'); d.className = 'card';
            d.innerHTML = `Q${i+1}: <input type="text" value="${val.q}" oninput="tasks[${i}].q=this.value;draw()"><br>
                Correct: <input type="text" value="${val.right}" oninput="tasks[${i}].right=this.value;draw()"><br>
                Wrong: <input type="text" value="${val.wrong}" oninput="tasks[${i}].wrong=this.value;draw()">`;
            c.appendChild(d);
        });
    }

    function getCode() {
        const pSize = document.getElementById('p-size').value;
        const startX = document.getElementById('start-x').value;
        const stepY = document.getElementById('step-y').value;
        const pUrl = document.getElementById('p-url').value;
        const pCol = document.getElementById('p-col').value;
        const data = JSON.stringify(tasks);
        
        return `<iframe srcdoc='<!DOCTYPE html><html><body style="margin:0;background:#87ceeb;overflow:visible">
            <div id="g" style="position:relative;width:400px;height:500px">
                <div id="p" style="position:absolute;width:${pSize}px;height:${pSize}px;background:url(${pUrl}) no-repeat center/contain;transition:0.3s;z-index:100;border:1px solid red"></div>
            </div>
            <script>
                const tasks=${data}, g=document.getElementById("g"), p=document.getElementById("p");
                const pSize=${pSize}, startX=${startX}, stepY=${stepY};
                tasks.forEach((_,i)=>{
                    const d=document.createElement("div");
                    d.style="position:absolute;width:60px;height:10px;background:${pCol};left:${startX}px;bottom:"+(50 + i*stepY)+"px;border:1px solid #000";
                    g.appendChild(d);
                });
                p.style.left = (parseInt(startX) + 30 - pSize/2) + "px";
                p.style.bottom = (50 + 10) + "px";
            <\/script></body></html>' width="400" height="500" frameborder="0"></iframe>`;
    }

    function draw() { document.getElementById('preview-frame').innerHTML = getCode(); }
    function copyCode() { navigator.clipboard.writeText(getCode()); alert("Код скопирован!"); }
    renderEditor(); draw();
</script>
</body>
</html>
