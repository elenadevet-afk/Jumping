<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; display: flex; font-family: sans-serif; background: #222; color: #fff; }
        #sidebar { width: 400px; height: 100vh; overflow-y: auto; padding: 20px; background: #333; }
        .box { margin-bottom: 20px; padding: 10px; border: 1px solid #555; }
        input { display: block; width: 95%; margin-bottom: 10px; }
        #canvas { width: 400px; height: 500px; border: 2px solid #fff; position: relative; overflow: hidden; background: #87ceeb; margin: 20px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>Настройки лестницы</h3>
    <label>Угол наклона (Шаг X):</label>
    <input type="range" id="angle" min="5" max="80" value="30" oninput="update()">
    
    <h3>Цвета</h3>
    <label>Ступени:</label>
    <input type="color" id="col-steps" value="#4caf50" oninput="update()">
    <label>Таймер:</label>
    <input type="color" id="col-timer" value="#ff0000" oninput="update()">
    
    <h3>Текст</h3>
    <input type="text" id="win-text" value="Победа!" oninput="update()">
    <button onclick="copyToClipboard()" style="width:100%; padding:15px; background:gold; cursor:pointer;">СКОПИРОВАТЬ ИТОГОВЫЙ КОД</button>
</div>

<div id="canvas"></div>

<script>
    function update() {
        const angle = document.getElementById('angle').value;
        const colSteps = document.getElementById('col-steps').value;
        const colTimer = document.getElementById('col-timer').value;
        const canvas = document.getElementById('canvas');
        
        let html = `<div style="color:${colTimer}; font-weight:bold; padding:10px;">🕒 05:00</div>`;
        for(let i=0; i<8; i++) {
            html += `<div style="position:absolute; width:60px; height:10px; background:${colSteps}; 
            left:${30 + (i*angle)}px; bottom:${50 + (i*40)}px;"></div>`;
        }
        canvas.innerHTML = html;
    }
    
    function copyToClipboard() {
        alert("Код для Genially скопирован!");
        // Здесь будет полная вставка
    }
    update();
</script>
</body>
</html>
